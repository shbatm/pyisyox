name: CI

"on":
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt -r requirements-dev.txt
      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: no-commit-to-branch

  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: |
          if ls tests >/dev/null 2>&1; then pytest -q; else echo "No tests found"; fi
